<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YakındaUsta</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 26px;
}

input {
  width: 90%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-top: 20px;
  font-size: 16px;
}

button {
  margin-top: 15px;
  padding: 15px;
  width: 90%;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  background: #25D366;
  color: white;
  cursor: pointer;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-top: 20px;
}

.option {
  display: block;
  background: #334155;
  margin: 10px;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🔧 Giresun’da Usta Bul</h1>
<p>Ne yaptırmak istiyorsun?</p>

<input id="inputText" placeholder="Örn: musluk akıyor..." />

<button onclick="analizEt()">Usta Bul</button>

<div id="sonuc"></div>

<script>

function kategoriBul(metin) {
  metin = metin.toLowerCase();

  let skor = {
    tesisat: 0,
    elektrik: 0,
    temizlik: 0,
    nakliye: 0,
    boya: 0
  };

  // TESİSAT
  if (metin.includes("su")) skor.tesisat++;
  if (metin.includes("musluk")) skor.tesisat++;
  if (metin.includes("tıkan")) skor.tesisat++;
  if (metin.includes("lavabo")) skor.tesisat++;

  // ELEKTRİK
  if (metin.includes("priz")) skor.elektrik++;
  if (metin.includes("elektrik")) skor.elektrik++;
  if (metin.includes("sigorta")) skor.elektrik++;

  // TEMİZLİK
  if (metin.includes("temizlik")) skor.temizlik++;
  if (metin.includes("halı")) skor.temizlik++;
  if (metin.includes("koltuk")) skor.temizlik++;

  // NAKLİYE
  if (metin.includes("taşın")) skor.nakliye++;
  if (metin.includes("nakliye")) skor.nakliye++;

  // BOYA
  if (metin.includes("boya")) skor.boya++;
  if (metin.includes("badana")) skor.boya++;

  // EN YÜKSEK SKOR
  let maxKategori = "bilinmiyor";
  let maxDeger = 0;

  for (let key in skor) {
    if (skor[key] > maxDeger) {
      maxDeger = skor[key];
      maxKategori = key;
    }
  }

  if (maxDeger === 0) return "bilinmiyor";

  return maxKategori;
}

function analizEt() {
  let metin = document.getElementById("inputText").value;
  let kategori = kategoriBul(metin);
  let sonucDiv = document.getElementById("sonuc");

  if (kategori === "bilinmiyor") {
    sonucDiv.innerHTML = `
      <div class="card">
        🤔 Tam anlayamadım <br><br>
        <div class="option" onclick="sec('Tesisat')">🔧 Tesisat</div>
        <div class="option" onclick="sec('Elektrik')">⚡ Elektrik</div>
        <div class="option" onclick="sec('Temizlik')">🧹 Temizlik</div>
        <div class="option" onclick="sec('Nakliye')">🚛 Nakliye</div>
        <div class="option" onclick="sec('Boya')">🎨 Boya</div>
      </div>
    `;
  } else {
    yonlendir(kategori, metin);
  }
}

function sec(kategori) {
  let metin = document.getElementById("inputText").value;
  yonlendir(kategori, metin);
}

function yonlendir(kategori, metin) {

  let mesaj = `Merhaba, YakındaUsta üzerinden yazıyorum.

Hizmet: ${kategori}
Detay: ${metin}
Konum: `;

  let url = "https://wa.me/905060270551?text=" + encodeURIComponent(mesaj);

  window.open(url, "_blank");
}

</script>

</body>
</html>
